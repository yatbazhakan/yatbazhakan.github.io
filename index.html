<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr. [Your Name] | Queen's University Belfast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1a1a2e; line-height: 1.6; }
    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    :root {
      --qub-red: #C8102E;
      --qub-red-dark: #a00d24;
      --qub-navy: #1A1F2E;
      --qub-navy-mid: #2d3350;
      --qub-gold: #d4a843;
      --qub-light: #f5f4f2;
      --qub-border: #e2e0db;
      --text-muted: #6b7280;
      --max-w: 1140px;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "name": "Dr. Hakan Yekta Yatbaz",
  "title": "Lecturer in Autonomous Systems",
  "department": "School of Electronics, Electrical Engineering and Computer Science",
  "tagline": "Advancing AI-Safety for Autonomous Systems",
  "email": "yatbazhakan@gmail.com",
  "office": "Ashby Building, Room 08.010",
  "scholarUrl": "https:\/\/scholar.google.com\/citations?user=5Q596f4AAAAJ",
  "linkedinUrl": "https:\/\/www.linkedin.com\/in\/hakanyektayatbaz\/",
  "githubUrl": "https:\/\/github.com\/yatbazhakan",
  "accentColor": "#C8102E",
  "showPhDBadge": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [menuOpen, setMenuOpen] = React.useState(false);

  const accent = tweaks.accentColor;
  const accentDark = tweaks.accentColor === '#C8102E' ? '#a00d24' : tweaks.accentColor;

  const css = `
    :root {
      --qub-red: ${accent};
      --qub-red-dark: ${accentDark};
    }
  `;

  return (
    <>
      <style>{css}</style>
      <Nav tweaks={tweaks} menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
      <main>
        <Hero tweaks={tweaks} />
        <About tweaks={tweaks} />
        <Research />
        <EUProjects />
        <PhDSection tweaks={tweaks} />
        <Publications />
        <News />
        <AcademicServices />
        <Contact tweaks={tweaks} />
      </main>
      <Footer tweaks={tweaks} />
      <TweaksUI tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

/* ── NAV ── */
function Nav({ tweaks, menuOpen, setMenuOpen }) {
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const links = [
    {label:'About', href:'#about'},
    {label:'Research', href:'#research'},
    {label:'PhD', href:'#phd-opportunities'},
    {label:'Publications', href:'publications.html'},
    {label:'Teaching', href:'teaching.html'},
    {label:'Supervision', href:'supervision.html'},
    {label:'Contact', href:'#contact'},
  ];

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
      background: scrolled ? 'rgba(26,31,46,0.97)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      transition: 'background 0.3s, box-shadow 0.3s',
      boxShadow: scrolled ? '0 2px 20px rgba(0,0,0,0.25)' : 'none',
    }}>
      <div style={{ maxWidth: 'var(--max-w)', margin: '0 auto', padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 64 }}>
        <a href="#top" style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <QubLogo />
          <span style={{ color: '#fff', fontWeight: 600, fontSize: 14, letterSpacing: '0.02em', display: 'flex', flexDirection: 'column', lineHeight: 1.2 }}>
            <span style={{ opacity: 0.7, fontWeight: 400, fontSize: 11 }}>Queen's University Belfast</span>
            <span>{tweaks.name.replace(/^Dr\.\s|^Prof\.\s/,'').split(' ').slice(-1)[0]}</span>
          </span>
        </a>
        {/* Desktop links */}
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }} className="desktop-nav">
          {links.map(l => (
            <a key={l.label} href={l.href}
              style={{ color: 'rgba(255,255,255,0.82)', fontSize: 13, fontWeight: 500, padding: '6px 12px', borderRadius: 6, transition: 'color 0.2s, background 0.2s' }}
              onMouseEnter={e => { e.target.style.color='#fff'; e.target.style.background='rgba(255,255,255,0.1)'; }}
              onMouseLeave={e => { e.target.style.color='rgba(255,255,255,0.82)'; e.target.style.background='transparent'; }}
            >{l.label}</a>
          ))}
          <a href={`mailto:${tweaks.email}`}
            style={{ marginLeft: 8, background: 'var(--qub-red)', color: '#fff', padding: '8px 18px', borderRadius: 24, fontSize: 13, fontWeight: 600, transition: 'background 0.2s' }}
            onMouseEnter={e => e.target.style.background='var(--qub-red-dark)'}
            onMouseLeave={e => e.target.style.background='var(--qub-red)'}
          >Get in Touch</a>
        </div>
        {/* Hamburger */}
        <button onClick={() => setMenuOpen(o => !o)}
          style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'none', flexDirection: 'column', gap: 5, padding: 8 }}
          className="hamburger" aria-label="Menu">
          {[0,1,2].map(i => <span key={i} style={{ display: 'block', width: 24, height: 2, background: '#fff', borderRadius: 2, transition: 'all 0.2s', transform: menuOpen ? (i===0?'translateY(7px) rotate(45deg)':i===2?'translateY(-7px) rotate(-45deg)':'scaleX(0)') : 'none' }}></span>)}
        </button>
      </div>
      {/* Mobile menu */}
      {menuOpen && (
        <div style={{ background: 'rgba(26,31,46,0.98)', padding: '12px 24px 24px', display: 'flex', flexDirection: 'column', gap: 4 }}>
          {links.map(l => (
            <a key={l.label} href={l.href}
              onClick={() => setMenuOpen(false)}
              style={{ color: 'rgba(255,255,255,0.85)', fontSize: 16, fontWeight: 500, padding: '12px 0', borderBottom: '1px solid rgba(255,255,255,0.08)' }}>
              {l.label}
            </a>
          ))}
          <a href={`mailto:${tweaks.email}`} onClick={() => setMenuOpen(false)}
            style={{ marginTop: 12, background: 'var(--qub-red)', color: '#fff', padding: '12px 18px', borderRadius: 8, fontSize: 15, fontWeight: 600, textAlign: 'center' }}>
            Get in Touch
          </a>
        </div>
      )}
      <style>{`
        @media (max-width: 768px) {
          .desktop-nav { display: none !important; }
          .hamburger { display: flex !important; }
        }
      `}</style>
    </nav>
  );
}

/* ── HERO ── */
function Hero({ tweaks }) {
  return (
    <section id="top" style={{ minHeight: '100vh', background: 'var(--qub-navy)', display: 'flex', alignItems: 'center', position: 'relative', overflow: 'hidden' }}>
      {/* Background geometry */}
      <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
        <div style={{ position: 'absolute', top: '-10%', right: '-5%', width: '55%', height: '120%', background: 'linear-gradient(135deg, var(--qub-red) 0%, #7a0017 100%)', clipPath: 'polygon(20% 0%, 100% 0%, 100% 100%, 0% 100%)', opacity: 0.18 }}></div>
        <div style={{ position: 'absolute', bottom: '-60px', left: '-60px', width: 400, height: 400, borderRadius: '50%', border: '1px solid rgba(200,16,46,0.15)' }}></div>
        <div style={{ position: 'absolute', bottom: '-30px', left: '-30px', width: 250, height: 250, borderRadius: '50%', border: '1px solid rgba(200,16,46,0.1)' }}></div>
        <div style={{ position: 'absolute', top: '10%', right: '8%', width: 180, height: 180, borderRadius: '50%', border: '1px solid rgba(255,255,255,0.05)' }}></div>
      </div>

      <div style={{ maxWidth: 'var(--max-w)', margin: '0 auto', padding: '120px 24px 80px', width: '100%', display: 'grid', gridTemplateColumns: '1fr auto', gap: 60, alignItems: 'center', position: 'relative' }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 24 }}>
            <span style={{ display: 'block', width: 36, height: 3, background: 'var(--qub-red)', borderRadius: 2 }}></span>
            <span style={{ color: 'rgba(255,255,255,0.6)', fontSize: 13, fontWeight: 500, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{tweaks.department}</span>
          </div>
          <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(2.4rem, 5vw, 4rem)', fontWeight: 700, color: '#fff', lineHeight: 1.15, marginBottom: 20 }}>
            {tweaks.name}
          </h1>
          <p style={{ fontSize: 'clamp(1rem, 2vw, 1.25rem)', color: 'var(--qub-red)', fontWeight: 600, marginBottom: 12, letterSpacing: '0.01em' }}>
            {tweaks.title}
          </p>
          <p style={{ fontSize: 'clamp(1rem, 1.8vw, 1.15rem)', color: 'rgba(255,255,255,0.7)', maxWidth: 560, marginBottom: 36, lineHeight: 1.7, fontStyle: 'italic' }}>
            "{tweaks.tagline}"
          </p>
          {tweaks.showPhDBadge && (
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'rgba(200,16,46,0.15)', border: '1px solid rgba(200,16,46,0.4)', borderRadius: 24, padding: '8px 18px', marginBottom: 36 }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--qub-red)', display: 'block' }}></span>
              <span style={{ color: 'rgba(255,255,255,0.9)', fontSize: 13, fontWeight: 500 }}>PhD Enquiries Welcome</span>
            </div>
          )}
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            <a href="#phd-opportunities" style={{ background: 'var(--qub-red)', color: '#fff', padding: '14px 28px', borderRadius: 8, fontWeight: 600, fontSize: 15, transition: 'all 0.2s', display: 'inline-block' }}
              onMouseEnter={e => { e.target.style.background='var(--qub-red-dark)'; e.target.style.transform='translateY(-1px)'; }}
              onMouseLeave={e => { e.target.style.background='var(--qub-red)'; e.target.style.transform='none'; }}>
              PhD Inquiries →
            </a>
            <a href="#about" style={{ background: 'transparent', color: '#fff', padding: '14px 28px', borderRadius: 8, fontWeight: 600, fontSize: 15, border: '1px solid rgba(255,255,255,0.25)', transition: 'all 0.2s', display: 'inline-block' }}
              onMouseEnter={e => { e.target.style.background='rgba(255,255,255,0.08)'; e.target.style.transform='translateY(-1px)'; }}
              onMouseLeave={e => { e.target.style.background='transparent'; e.target.style.transform='none'; }}>
              My Research
            </a>
          </div>
        </div>
        {/* Photo */}
        <div style={{ width: 'clamp(160px, 18vw, 260px)', flexShrink: 0 }} className="hero-photo">
          <div style={{ aspectRatio: '3/4', borderRadius: 16, overflow: 'hidden', background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
            <img src="photo.jpg" alt="Dr. Hakan Yekta Yatbaz"
              style={{ width: '100%', height: '100%', objectFit: 'cover' }}
              onError={e => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}
            />
            <div style={{ display: 'none', flexDirection: 'column', alignItems: 'center', gap: 10, padding: 20 }}>
              <svg viewBox="0 0 160 200" style={{ width: '70%', opacity: 0.25 }}><circle cx="80" cy="70" r="40" fill="#fff"/><ellipse cx="80" cy="160" rx="60" ry="50" fill="#fff"/></svg>
              <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', textAlign: 'center', lineHeight: 1.5 }}>Add photo.jpg to project folder</div>
            </div>
          </div>
        </div>
      </div>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
        @media (max-width: 640px) { .hero-photo { display: none; } }
      `}</style>
    </section>
  );
}

/* ── ABOUT ── */
function About({ tweaks }) {
  const stats = [
    { n: '327+', label: 'Citations' },
    { n: '19', label: 'Publications' },
    { n: '9', label: 'h-index' },
    { n: '7', label: 'i10-index' },
  ];
  return (
    <section id="about" style={{ background: '#fff', padding: '96px 24px' }}>
      <div style={{ maxWidth: 'var(--max-w)', margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'start' }}>
        <div>
          <SectionLabel color="var(--qub-red)">About</SectionLabel>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(1.8rem, 3vw, 2.5rem)', fontWeight: 700, color: 'var(--qub-navy)', lineHeight: 1.2, marginBottom: 24 }}>
            Researcher, Educator &amp; Collaborator
          </h2>
          <p style={{ color: '#4b5563', lineHeight: 1.85, marginBottom: 16, fontSize: 15 }}>
            I am a Lecturer (Assistant Professor) in Autonomous Systems at the School of Electronics, Electrical Engineering and Computer Science (EEECS), Queen's University Belfast. My research centres on building safe, reliable, and secure AI for intelligent transport systems, with two core pillars: <strong>Run-time Monitoring &amp; Introspection</strong> of LiDAR-based perception under uncertainty, and <strong>Safe &amp; Resilient Cooperative Autonomy</strong> for Connected and Automated Vehicles (CAVs).
          </p>
          <p style={{ color: '#4b5563', lineHeight: 1.85, marginBottom: 32, fontSize: 15 }}>
            Prior to QUB, I was a Postdoctoral Research Fellow at WMG, University of Warwick, working on EU-funded projects (EVENTS and Hi-Drive) integrating self-assessment frameworks into real-world automated driving pipelines. I completed my PhD in Engineering at Warwick (supervised by Dr. Roger Woodman and Prof. Mehrdad Dianati) and hold an MSc and BSc in Computer Engineering from METU NCC.
          </p>
          <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
            {[['Google Scholar', tweaks.scholarUrl, '📄'], ['LinkedIn', tweaks.linkedinUrl, '💼'], ['GitHub', tweaks.githubUrl, '💻']].map(([label, url, icon]) => (
              <a key={label} href={url}
                style={{ display: 'flex', alignItems: 'center', gap: 8, border: '1px solid var(--qub-border)', padding: '9px 18px', borderRadius: 8, fontSize: 13, fontWeight: 500, color: 'var(--qub-navy)', transition: 'all 0.2s', background: '#fff' }}
                onMouseEnter={e => { e.currentTarget.style.borderColor='var(--qub-red)'; e.currentTarget.style.color='var(--qub-red)'; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor='var(--qub-border)'; e.currentTarget.style.color='var(--qub-navy)'; }}>
                <span>{icon}</span> {label}
              </a>
            ))}
          </div>
        </div>
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 32 }}>
            {stats.map(s => (
              <div key={s.label} style={{ background: 'var(--qub-light)', borderRadius: 12, padding: '28px 24px', textAlign: 'center' }}>
                <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 40, fontWeight: 700, color: 'var(--qub-red)', lineHeight: 1 }}>{s.n}</div>
                <div style={{ fontSize: 13, color: 'var(--qub-text-muted, #6b7280)', fontWeight: 500, marginTop: 6 }}>{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{ background: 'var(--qub-navy)', borderRadius: 12, padding: '24px 28px' }}>
            <p style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, marginBottom: 6, fontWeight: 500, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Current Affiliations</p>
            {['Member, IEEE', 'Associate Fellow, Advance HE (PR307078)', 'Postdoc, WMG University of Warwick', 'PhD, University of Warwick (Woodman & Dianati)'].map(a => (
              <div key={a} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid rgba(255,255,255,0.07)', color: '#fff', fontSize: 14 }}>
                <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--qub-red)', flexShrink: 0, display: 'block' }}></span>
                {a}
              </div>
            ))}
          </div>
        </div>
      </div>
      <style>{`@media(max-width:768px){ #about .two-col { grid-template-columns: 1fr !important; gap: 40px !important; } }`}</style>
    </section>
  );
}

/* ── RESEARCH ── */
function Research() {
  const areas = [
    { icon: '🚗', title: 'AI Safety for Autonomous Driving', desc: 'Developing run-time monitoring and introspection frameworks that detect failures in DNN-based perception before they lead to safety-critical incidents.' },
    { icon: '🔍', title: 'DNN Introspection & Integrity Monitoring', desc: 'Analysing neural activation patterns to assess the reliability and integrity of deep learning models operating in dynamic real-world environments.' },
    { icon: '📡', title: 'LiDAR-based 3D Object Detection', desc: 'Advancing point-cloud perception pipelines for automated vehicles, including multi-layer self-assessment and spatial filtering techniques.' },
    { icon: '🏥', title: 'IoT & E-Health Systems', desc: 'Designing sensor-based activity recognition and anomaly detection systems for healthcare monitoring of elderly and vulnerable populations.' },
  ];
  return (
    <section id="research" style={{ background: 'var(--qub-light)', padding: '96px 24px' }}>
      <div style={{ maxWidth: 'var(--max-w)', margin: '0 auto' }}>
        <div style={{ textAlign: 'center', marginBottom: 56 }}>
          <SectionLabel color="var(--qub-red)" center>Research</SectionLabel>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 'clamp(1.8rem, 3vw, 2.5rem)', fontWeight: 700, color: 'var(--qub-navy)', lineHeight: 1.2 }}>
            Research Interests
          </h2>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: 24 }}>
          {areas.map(a => (
            <div key={a.title} style={{ background: '#fff', borderRadius: 12, padding: '32px 28px', borderTop: '3px solid var(--qub-red)', transition: 'transform 0.2s, box-shadow 0.2s' }}
              onMouseEnter={e => { e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow='0 12px 40px rgba(0,0,0,0.1)'; }}
              onMouseLeave={e => { e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}>
              <div style={{ fontSize: 36, marginBottom: 16 }}>{a.icon}</div>
              <h3 style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: 'var(--qub-navy)', marginBottom: 10 }}>{a.title}</h3>
              <p style={{ color: '#6b7280', fontSize: 14, lineHeight: 1.75 }}>{a.desc}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ── PHD SECTION ── */

  return (

      <div style={{ maxWidth: 'var(--max-w)', margin: '0 auto', position: 'relative', textAlign: 'center' }}>
        <SectionLabel color="var(--qub-red)" center>Opportunities</SectionLabel>

        <p style={{ color: 'rgba(255,255,255,0.65)', fontSize: 16, lineHeight: 1.8, marginBottom: 36, maxWidth: 700, margin: '0 auto 36px' }}>
